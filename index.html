<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Üs Başlangıcı</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding-top: 60px;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 15px #00ff00;
            margin-bottom: 20px;
        }
        .siber-profil-fotosu {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 2px solid #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ff00;
            margin: 20px auto 10px auto;
            display: block;
        }
        p {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
        }
        .buton-kutusu {
            margin-top: 40px;
            text-align: center;
        }
        .siber-buton {
            display: inline-block;
            background-color: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 12px 30px;
            margin: 0 10px;
            text-decoration: none;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px #00ff00;
        }
        .siber-buton:hover {
            background-color: #00ff00;
            color: black;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>SİSTEME GİRİŞ YAPILDI</h1>
    
    <img src="profil.jpeg" alt="Siber Profil" class="siber-profil-fotosu">

    <p>the best</p>

    <div class="buton-kutusu">
        <a href="https://instagram.com/hazrwti" target="_blank" class="siber-buton">Instagram</a>
        <a href="https://t.me/gotunu" target="_blank" class="siber-buton">Telegram</a>
    </div>

</body>
</html>
