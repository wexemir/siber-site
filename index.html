<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Üs: Ana Kontrol Paneli</title>
    <style>
        :root {
            --main-color: #00ff00;
            --main-shadow: 0 0 15px #00ff00;
        }

        body.theme-red {
            --main-color: #ff0033;
            --main-shadow: 0 0 15px #ff0033;
        }

        body.theme-blue {
            --main-color: #00d2ff;
            --main-shadow: 0 0 15px #00d2ff;
        }

        body.hacking-mode {
            --main-color: #ff0000 !important;
            --main-shadow: 0 0 25px #ff0000 !important;
            animation: red-alert 0.2s infinite alternate;
        }

        @keyframes red-alert {
            0% { background-color: #000; }
            100% { background-color: #1a0000; }
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
            color: var(--main-color);
            cursor: auto;
        }

        #theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--main-color);
            color: var(--main-color);
            padding: 8px 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: var(--main-shadow);
            border-radius: 4px;
            transition: 0.3s;
        }
        #theme-switcher:hover {
            background: var(--main-color);
            color: #000;
        }

        #console-logs {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 290px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--main-color);
            padding: 10px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: var(--main-color);
            z-index: 1000;
            box-shadow: var(--main-shadow);
            border-radius: 4px;
            pointer-events: none;
            opacity: 0.85;
        }

        canvas#matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .icerik-kutusu {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 30px;
            box-sizing: border-box;
        }

        .glitch {
            font-size: 3rem;
            position: relative;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 var(--main-color),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 1s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch 650ms infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-0.025em, -0.0125em);
            opacity: 0.8;
        }

        .glitch::after {
            animation: glitch 375ms infinite;
            clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
            transform: translate(0.025em, 0.025em);
            opacity: 0.8;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 var(--main-color), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 var(--main-color), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 var(--main-color), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 var(--main-color), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 var(--main-color), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 var(--main-color), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 var(--main-color), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }

        .siber-profil-fotosu {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border: 2px solid var(--main-color);
            border-radius: 50%;
            box-shadow: var(--main-shadow);
            margin: 15px auto 5px auto;
            display: block;
        }
        .the-best-yazisi {
            font-size: 1.1rem;
            color: #888;
            margin: 5px 0;
        }
        .buton-kutusu {
            margin-top: 15px;
            text-align: center;
        }
        .siber-buton {
            display: inline-block;
            background-color: transparent;
            color: var(--main-color);
            border: 2px solid var(--main-color);
            padding: 10px 25px;
            margin: 0 8px;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: var(--main-shadow);
            cursor: pointer;
        }
        .siber-buton:hover {
            background-color: var(--main-color);
            color: black;
            box-shadow: 0 0 20px var(--main-color), 0 0 40px var(--main-color);
        }

        #hacker-terminal {
            width: 550px;
            height: 180px;
            max-width: 90%;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--main-color);
            box-shadow: var(--main-shadow);
            margin: 15px auto 0 auto;
            padding: 15px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            border-radius: 6px;
        }

        #terminal-history {
            white-space: pre-wrap;
            margin-bottom: 8px;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
        }

        .terminal-prefix {
            color: var(--main-color);
            font-weight: bold;
            margin-right: 8px;
            white-space: nowrap;
        }

        #terminal-input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            width: 100%;
            cursor: text;
        }

        /* --- SİBER OYUN EKRANI EKLENTİSİ --- */
        #game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #close-game-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 2px solid var(--main-color);
            color: var(--main-color);
            font-size: 18px;
            font-weight: bold;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            box-shadow: var(--main-shadow);
            transition: 0.3s;
            z-index: 10000;
        }

        #close-game-btn:hover {
            background: var(--main-color);
            color: #000;
        }

        #flappy-canvas {
            border: 2px solid var(--main-color);
            box-shadow: var(--main-shadow);
            background: #050505;
            max-width: 95%;
            max-height: 70vh;
            cursor: pointer;
        }
    </style>
</head>

    <script>
        // --- TEMA DEĞİŞTİRİCİ ---
        const themes = ['', 'theme-red', 'theme-blue'];
        let currentTheme = 0;
        const themeBtn = document.getElementById('theme-switcher');

        themeBtn.addEventListener('click', () => {
            if(document.body.classList.contains('hacking-mode')) return;
            document.body.classList.remove('theme-red', 'theme-blue');
            currentTheme = (currentTheme + 1) % themes.length;
            if (themes[currentTheme]) {
                document.body.classList.add(themes[currentTheme]);
            }
        });

        // --- CANLI KONSOL LOGLARI ---
        const consoleBox = document.getElementById('console-logs');
        const logs = [
            "[OK] Firewall Secure - 0 threats detected",
            "[IP] Proxy Connection Established: 185.220.X.X",
            "[SEC] SSL Encryption: ACTIVE (256-bit)",
            "[SYS] Matrix Core stable. CPU load: 11%",
            "[WARN] Port 80 monitored by admin",
            "[OK] Database sync complete (0 leaks)"
        ];

        setInterval(() => {
            const randomLog = logs[Math.floor(Math.random() * logs.length)];
            const div = document.createElement('div');
            div.textContent = randomLog;
            consoleBox.appendChild(div);
            if (consoleBox.children.length > 5) {
                consoleBox.removeChild(consoleBox.firstChild);
            }
        }, 3500);

        // --- İNTERAKTİF TERMİNAL ---
        const termInput = document.getElementById('terminal-input');
        const termHistory = document.getElementById('terminal-history');
        const termContainer = document.getElementById('hacker-terminal');

        termInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const command = termInput.value.trim().toLowerCase();
                let reply = `\nWexemir@siber-us:~$ ${termInput.value}\n`;

                if (command === 'help') {
                    reply += `Mevcut Komutlar:\n  help  - Komut listesini gösterir\n  stats - Kişisel veri ve istatistikleri çeker\n  hack  - Sahte siber saldırı simülasyonu başlatır\n  clear - Ekranı temizler`;
                } else if (command === 'stats') {
                    reply += `[+] KULÜP: BEŞİKTAŞ JK 🦅 (KARA KARTAL)\n[+] FAVORİ OYUNLAR: Minecraft, FIFA\n[+] DURUM: Siber Yönetici Aktif`;
                } else if (command === 'clear') {
                    termHistory.textContent = '';
                    termInput.value = '';
                    return;
                } else if (command === 'hack') {
                    reply += `[CRITICAL] UYARI: SİBER SALDIRI BAŞLATILIYOR...\n[!] Bütün sunucu protokolleri devre dışı bırakılıyor!`;
                    triggerFakeHack();
                } else if (command === '') {
                    reply = `\nWexemir@siber-us:~$\n`;
                } else {
                    reply += `Komut bulunamadı: '${command}'. Yardım için 'help' yazın.`;
                }

                termHistory.textContent += reply;
                termInput.value = '';
                termContainer.scrollTop = termContainer.scrollHeight;
            }
        });

        function triggerFakeHack() {
            document.body.classList.add('hacking-mode');
            termInput.disabled = true;

            let hackInterval = setInterval(() => {
                const hackLogs = [
                    "BYPASSING FIREWALL...",
                    "INJECTING EXPLOIT...",
                    "ACCESSING CORE DATABASE...",
                    "DOWNLOADING DATA PACKETS...",
                    "ROOT ACCESS GRANTED!"
                ];
                termHistory.textContent += `\n[ALERT] ` + hackLogs[Math.floor(Math.random() * hackLogs.length)];
                termContainer.scrollTop = termContainer.scrollHeight;
            }, 600);

            setTimeout(() => {
                clearInterval(hackInterval);
                document.body.classList.remove('hacking-mode');
                termInput.disabled = false;
                termHistory.textContent += `\n\n[SUCCESS] Saldırı simülasyonu tamamlandı. Sistem kararlı moda döndü.\n`;
                termInput.focus();
                termContainer.scrollTop = termContainer.scrollHeight;
            }, 4000);
        }

        // --- MATRİX YAĞMURU ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const matrixChar = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=<>[]#!?';
        const characters = matrixChar.split('');

        const fontSize = 16;
        const columns = canvas.width / fontSize; 

        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1; 
        }

        function getActiveColor() {
            if (document.body.classList.contains('hacking-mode')) return '#ff0000';
            if (document.body.classList.contains('theme-red')) return '#ff0033';
            if (document.body.classList.contains('theme-blue')) return '#00d2ff';
            return '#00ff00';
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = getActiveColor();
            ctx.font = fontSize + 'px Courier New';

            for (let i = 0; i < drops.length; i++) {
                const text = characters[Math.floor(Math.random() * characters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- FLAPPY SİBER MİNİ OYUN MOTORU ---
        const gameOverlay = document.getElementById('game-overlay');
        const gameBtn = document.getElementById('game-btn');
        const closeGameBtn = document.getElementById('close-game-btn');

        let animationId = null;
        let gameRunning = false;

        function resetGame() {
            bird = { x: 50, y: 200, size: 20, gravity: 0.35, velocity: 0, jump: -6 };
            pipes = [];
            score = 0;
            frameCount = 0;
            gameOverState = false;
        }

        function spawnPipe() {
            const gap = 130;
            const minHeight = 40;
            const maxHeight = gameCanvas.height - gap - minHeight;
            const height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            pipes.push({ x: gameCanvas.width, top: height, bottom: gameCanvas.height - height - gap, width: 45, passed: false });
        }

        function runGame() {
            if (!gameRunning) return;

            gameCtx.fillStyle = '#050505';
            gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

            const activeColor = getActiveColor();

            if (!gameOverState) {
                bird.velocity += bird.gravity;
                bird.y += bird.velocity;

                if (bird.y + bird.size > gameCanvas.height || bird.y < 0) {
                    gameOverState = true;
                }

                if (frameCount % 90 === 0) {
                    spawnPipe();
                }
                frameCount++;

                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].x -= 2.5;

                    if (!pipes[i].passed && pipes[i].x + pipes[i].width < bird.x) {
                        pipes[i].passed = true;
                        score++;
                    }

                        bird.x + bird.size > pipes[i].x &&
                        bird.x < pipes[i].x + pipes[i].width &&
                        (bird.y < pipes[i].top || bird.y + bird.size > gameCanvas.height - pipes[i].bottom)
                    ) {
                        gameOverState = true;
                    }

                    if (pipes[i].x + pipes[i].width < 0) {
                        pipes.splice(i, 1);
                    }
                }
            }

            gameCtx.fillStyle = activeColor;
            pipes.forEach(p => {
                gameCtx.fillRect(p.x, 0, p.width, p.top);
                gameCtx.fillRect(p.x, gameCanvas.height - p.bottom, p.width, p.bottom);
            });

            gameCtx.fillStyle = '#fff';
            gameCtx.shadowColor = activeColor;
            gameCtx.shadowBlur = 10;
            gameCtx.fillRect(bird.x, bird.y, bird.size, bird.size);
            gameCtx.shadowBlur = 0;

            gameCtx.fillStyle = activeColor;
            gameCtx.font = "20px 'Courier New'";
            gameCtx.fillText(`DATA: ${score}`, 15, 30);

            if (gameOverState) {
                gameCtx.fillStyle = 'rgba(0,0,0,0.85)';
                gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                gameCtx.fillStyle = '#ff0000';
