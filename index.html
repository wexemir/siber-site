<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Üs: Ana Kontrol Paneli</title>
    <style>
        :root {
            --main-color: #00ff00;
            --main-shadow: 0 0 15px #00ff00;
        }

        body.theme-red {
            --main-color: #ff0033;
            --main-shadow: 0 0 15px #ff0033;
        }

        body.theme-blue {
            --main-color: #00d2ff;
            --main-shadow: 0 0 15px #00d2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
            color: var(--main-color);
        }

        /* Matrix Tuvali - En altta ve tıklamalara tamamen kapalı */
        canvas#matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Tema Değiştirici - En üstte */
        #theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--main-color);
            color: var(--main-color);
            padding: 8px 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: var(--main-shadow);
            border-radius: 4px;
        }
        #theme-switcher:hover {
            background: var(--main-color);
            color: #000;
        }

        /* Ana İçerik Katmanı - Tıklanabilir olması için z-index yüksek ve pointer-events açık */
        .icerik-kutusu {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            text-align: center;
            pointer-events: auto;
        }

        .siber-profil-avatar {
            width: 100px;
            height: 100px;
            border: 2px solid var(--main-color);
            border-radius: 50%;
            box-shadow: var(--main-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.85);
        }

        .siber-buton {
            display: inline-block;
            background-color: rgba(0, 0, 0, 0.9);
            color: var(--main-color);
            border: 2px solid var(--main-color);
            padding: 10px 25px;
            margin: 0 8px;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
            box-shadow: var(--main-shadow);
            cursor: pointer;
            position: relative;
            z-index: 20;
        }
        .siber-buton:hover {
            background-color: var(--main-color);
            color: black;
        }

        /* OYUN EKRANI (OVERLAY) */
        #game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #close-game-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: 2px solid var(--main-color);
            color: var(--main-color);
            font-size: 18px;
            font-weight: bold;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            box-shadow: var(--main-shadow);
            z-index: 100000;
        }
        #close-game-btn:hover {
            background: var(--main-color);
            color: #000;
        }

        #flappy-canvas {
            border: 2px solid var(--main-color);
            box-shadow: var(--main-shadow);
            background: #050505;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="theme-switcher">🎨 TEMA</button>

    <!-- Matrix Arka Plan -->
    <canvas id="matrix"></canvas>

    <!-- Ana İçerik -->
    <div class="icerik-kutusu">
        <div class="siber-profil-avatar">🦅</div>
        <p style="color: #888; margin-bottom: 15px;">the best</p>

        <div style="margin-bottom: 20px;">
            <a href="https://instagram.com/hazrwti" target="_blank" class="siber-buton">Instagram</a>
            <button id="game-btn" class="siber-buton">Oyun Başlat</button>
        </div>
    </div>

    <!-- Oyun Ekranı Katmanı -->
    <div id="game-overlay">
        <button id="close-game-btn">X</button>
        <h2 style="color: var(--main-color); margin-bottom: 10px;">CYBER FLAPPER</h2>
        <p style="font-size: 12px; margin-bottom: 15px; color: var(--main-color);">Zıplamak için tıkla veya Space tuşuna bas</p>
        <canvas id="flappy-canvas" width="400" height="400"></canvas>
    </div>

    <script>
        // --- TEMA DEĞİŞTİRİCİ ---
        const themes = ['', 'theme-red', 'theme-blue'];
        let currentTheme = 0;
        document.getElementById('theme-switcher').addEventListener('click', () => {
            document.body.classList.remove('theme-red', 'theme-blue');
            currentTheme = (currentTheme + 1) % themes.length;
            if (themes[currentTheme]) document.body.classList.add(themes[currentTheme]);
        });

        // --- MATRİX YAĞMURU ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const characters = '01ABCDEF'.split('');
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const computedColor = getComputedStyle(document.documentElement).getPropertyValue('--main-color').trim();
            ctx.fillStyle = computedColor || '#00ff00';
            ctx.font = fontSize + 'px Courier New';

            for (let i = 0; i < drops.length; i++) {
                const text = characters[Math.floor(Math.random() * characters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- OYUN MOTORU ---
        const gameOverlay = document.getElementById('game-overlay');
        const gameBtn = document.getElementById('game-btn');
        const closeGameBtn = document.getElementById('close-game-btn');
        const gameCanvas = document.getElementById('flappy-canvas');
        const gameCtx = gameCanvas.getContext('2d');

        let animationId = null;
        let gameRunning = false;
        let bird, pipes, score, gameOverState;

        function resetGame() {
            bird = { x: 50, y: 150, size: 20, gravity: 0.4, velocity: 0, jump: -7 };
            pipes = [];
            score = 0;
            gameOverState = false;
        }

        function runGame() {
            if (!gameRunning) return;

            gameCtx.fillStyle = '#050505';
            gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

            const activeColor = getComputedStyle(document.documentElement).getPropertyValue('--main-color').trim();

            if (!gameOverState) {
                bird.velocity += bird.gravity;
                bird.y += bird.velocity;

                if (bird.y + bird.size > gameCanvas.height || bird.y < 0) {
                    gameOverState = true;
                }

                if (Math.random() < 0.02) {
                    const gap = 120;
                    const height = Math.floor(Math.random() * 200) + 50;
                    pipes.push({ x: gameCanvas.width, top: height, bottom: gameCanvas.height - height - gap, width: 40 });
                }

                pipes.forEach(p => p.x -= 2.5);
                pipes = pipes.filter(p => p.x + p.width > 0);

                pipes.forEach(p => {
                    if (
                        bird.x + bird.size > p.x &&
                        bird.x < p.x + p.width &&
                        (bird.y < p.top || bird.y + bird.size > gameCanvas.height - p.bottom)
                    ) {
                        gameOverState = true;
                    }
                });
            }

            // Boruları çiz
            gameCtx.fillStyle = activeColor;
            pipes.forEach(p => {
                gameCtx.fillRect(p.x, 0, p.width, p.top);
                gameCtx.fillRect(p.x, gameCanvas.height - p.bottom, p.width, p.bottom);
            });

            // Kuşu çiz
            gameCtx.fillStyle = '#fff';
            gameCtx.fillRect(bird.x, bird.y, bird.size, bird.size);

            // Skor
            gameCtx.fillStyle = activeColor;
            gameCtx.font = "18px 'Courier New'";
            gameCtx.fillText(`SKOR: ${score++}`, 15, 30);

            if (gameOverState) {
                gameCtx.fillStyle = 'rgba(0,0,0,0.85)';
                gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                gameCtx.fillStyle = '#ff0000';
                gameCtx.font = "24px 'Courier New'";
                gameCtx.fillText("OYUN BİTTİ!", 130, 180);
                gameCtx.fillStyle = activeColor;
                gameCtx.font = "14px 'Courier New'";
                gameCtx.fillText("Yeniden başlamak için tıkla", 90, 220);
            }

            animationId = requestAnimationFrame(runGame);
        }

        function triggerJump() {
            if (gameOverState) {
                resetGame();
            } else {
                bird.velocity = bird.jump;
            }
        }

        gameBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            gameOverlay.style.display = 'flex';
            gameRunning = true;
            resetGame();
            if (animationId) cancelAnimationFrame(animationId);
            runGame();
        });

        closeGameBtn.addEventListener('click', () => {
            gameOverlay.style.display = 'none';
            gameRunning = false;
            if (animationId) cancelAnimationFrame(animationId);
        });

        gameCanvas.addEventListener('click', triggerJump);
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' && gameRunning) {
                e.preventDefault();
                triggerJump();
            }
        });
    </script>
</body>
</html>
