<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Üs: Ana Kontrol Paneli</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
            color: #00ff00;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .icerik-kutusu {
            position: absolute;
            top: 60px;
            width: 100%;
            text-align: center;
            z-index: 1;
        }

        .glitch {
            font-size: 3rem;
            position: relative;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 rgba(0, 255, 0, 0.75),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 1s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch 650ms infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-0.025em, -0.0125em);
            opacity: 0.8;
        }

        .glitch::after {
            animation: glitch 375ms infinite;
            clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
            transform: translate(0.025em, 0.025em);
            opacity: 0.8;
        }

        @keyframes glitch {
            0% {
                text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            }
            14% {
                text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            }
            15% {
                text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75);
            }
            49% {
                text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75);
            }
            50% {
                text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75);
            }
            99% {
                text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75);
            }
            100% {
                text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75);
            }
        }

        .siber-profil-fotosu {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 2px solid #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ff00;
            margin: 20px auto 10px auto;
            display: block;
        }
        .the-best-yazisi {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
        }
        .buton-kutusu {
            margin-top: 40px;
            text-align: center;
        }
        .siber-buton {
            display: inline-block;
            background-color: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 12px 30px;
            margin: 0 10px;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px #00ff00;
        }
        .siber-buton:hover {
            background-color: #00ff00;
            color: black;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="icerik-kutusu">
        <h1 class="glitch" data-text="SİSTEME GİRİŞ YAPILDI">SİSTEME GİRİŞ YAPILDI</h1>
        
        <img src="profil.jpeg" alt="Siber Profil" class="siber-profil-fotosu">

        <p class="the-best-yazisi">the best</p>

        <div class="buton-kutusu">
            <a href="https://instagram.com/hazrwti" target="_blank" class="siber-buton">Instagram</a>
            <a href="https://t.me/gotunu" target="_blank" class="siber-buton">Telegram</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const matrixChar = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=<>[]#!?';
        const characters = matrixChar.split('');

        const fontSize = 16;
        const columns = canvas.width / fontSize; 

        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1; 
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px Courier New';

            for (let i = 0; i < drops.length; i++) {
                const text = characters[Math.floor(Math.random() * characters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
