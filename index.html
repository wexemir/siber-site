<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Üs: Ana Kontrol Paneli</title>
    <style>
        /* --- DİNAMİK TEMA DEĞİŞKENLERİ --- */
        :root {
            --main-color: #00ff00; /* Varsayılan: Matrix Yeşili */
            --main-shadow: 0 0 15px #00ff00;
        }

        body.theme-red {
            --main-color: #ff0033; /* Tehlike Kırmızısı */
            --main-shadow: 0 0 15px #ff0033;
        }

        body.theme-blue {
            --main-color: #00d2ff; /* Siber Mavi */
            --main-shadow: 0 0 15px #00d2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
            color: var(--main-color);
            cursor: none; /* Varsayılan imleç gizlendi */
        }

        /* --- ÖZEL SİBER İMLEÇ --- */
        #custom-cursor {
            position: fixed;
            width: 22px;
            height: 22px;
            border: 2px solid var(--main-color);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--main-color);
            z-index: 9999;
            transition: width 0.15s, height 0.15s;
        }

        /* --- TEMA DEĞİŞTİRME BUTONU (SAĞ ÜST) --- */
        #theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--main-color);
            color: var(--main-color);
            padding: 8px 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            box-shadow: var(--main-shadow);
            border-radius: 4px;
            transition: 0.3s;
        }
        #theme-switcher:hover {
            background: var(--main-color);
            color: #000;
        }

        /* --- CANLI KONSOL LOGLARI (SOL ALT) --- */
        #console-logs {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 290px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--main-color);
            padding: 10px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: var(--main-color);
            z-index: 1000;
            box-shadow: var(--main-shadow);
            border-radius: 4px;
            pointer-events: none;
            opacity: 0.85;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        .icerik-kutusu {
            position: absolute;
            top: 60px;
            width: 100%;
            text-align: center;
            z-index: 1;
        }

        /* --- SİBER ARIZA (GLITCH) EFEKTİ --- */
        .glitch {
            font-size: 3rem;
            position: relative;
            text-transform: uppercase;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75),
                        -0.025em -0.05em 0 var(--main-color),
                        0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 1s infinite;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch 650ms infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-0.025em, -0.0125em);
            opacity: 0.8;
        }

        .glitch::after {
            animation: glitch 375ms infinite;
            clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
            transform: translate(0.025em, 0.025em);
            opacity: 0.8;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 var(--main-color), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 var(--main-color), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 var(--main-color), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 var(--main-color), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 var(--main-color), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 var(--main-color), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 var(--main-color), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }

        .siber-profil-fotosu {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border: 2px solid var(--main-color);
            border-radius: 50%;
            box-shadow: var(--main-shadow);
            margin: 20px auto 10px auto;
            display: block;
        }
        .the-best-yazisi {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
        }
        .buton-kutusu {
            margin-top: 40px;
            text-align: center;
        }
        .siber-buton {
            display: inline-block;
            background-color: transparent;
            color: var(--main-color);
            border: 2px solid var(--main-color);
            padding: 12px 30px;
            margin: 0 10px;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: var(--main-shadow);
        }
        .siber-buton:hover {
            background-color: var(--main-color);
            color: black;
            box-shadow: 0 0 20px var(--main-color), 0 0 40px var(--main-color);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Özel İmleç -->
    <div id="custom-cursor"></div>

    <!-- Tema Değiştirici Buton -->
    <button id="theme-switcher">🎨 TEMA DEĞİŞTİR</button>

    <!-- Sol Alt Konsol Logları -->
    <div id="console-logs">
        <div>[SYS] System Initialized...</div>
    </div>

    <!-- Matrix Arka Planı -->
    <canvas id="matrix"></canvas>

    <div class="icerik-kutusu">
        <h1 class="glitch" data-text="SİSTEME GİRİŞ YAPILDI">SİSTEME GİRİŞ YAPILDI</h1>
        
        <img src="profil.jpeg" alt="Siber Profil" class="siber-profil-fotosu">

        <p class="the-best-yazisi">the best</p>

        <div class="buton-kutusu">
            <a href="https://instagram.com/hazrwti" target="_blank" class="siber-buton">Instagram</a>
            <a href="https://t.me/gotunu" target="_blank" class="siber-buton">Telegram</a>
        </div>
    </div>

    <script>
        // --- 1. ÖZEL İMLEÇ HAREKETİ ---
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // --- 2. SİBER SES EFEKTLERİ (WEB AUDIO API) ---
        function playCyberSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.04);
                gainNode.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.04);
            } catch (e) {}
        }

        // Butonlara ve Tema tuşuna ses ekle
        document.querySelectorAll('.siber-buton, #theme-switcher').forEach(el => {
            el.addEventListener('mouseenter', playCyberSound);
            el.addEventListener('click', playCyberSound);
        });

        // --- 3. TEMA DEĞİŞTİRİCİ MANTIĞI ---
        const themes = ['', 'theme-red', 'theme-blue'];
        let currentTheme = 0;
        const themeBtn = document.getElementById('theme-switcher');

        themeBtn.addEventListener('click', () => {
            document.body.classList.remove('theme-red', 'theme-blue');
            currentTheme = (currentTheme + 1) % themes.length;
            if (themes[currentTheme]) {
                document.body.classList.add(themes[currentTheme]);
            }
        });

        // --- 4. CANLI KONSOL LOGLARI ---
        const consoleBox = document.getElementById('console-logs');
        const logs = [
            "[OK] Firewall Secure - 0 threats detected",
            "[IP] Proxy Connection Established: 185.220.X.X",
            "[SEC] SSL Encryption: ACTIVE (256-bit)",
            "[SYS] Matrix Core stable. CPU load: 11%",
            "[WARN] Port 80 monitored by admin",
            "[OK] Database sync complete (0 leaks)"
        ];

        setInterval(() => {
            const randomLog = logs[Math.floor(Math.random() * logs.length)];
            const div = document.createElement('div');
            div.textContent = randomLog;
            consoleBox.appendChild(div);
            if (consoleBox.children.length > 5) {
                consoleBox.removeChild(consoleBox.firstChild);
            }
        }, 3500);

        // --- MATRIX YAĞMURU ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        const matrixChar = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=<>[]#!?';
        const characters = matrixChar.split('');

        const fontSize = 16;
        const columns = canvas.width / fontSize; 

        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1; 
        }

        function getActiveColor() {
            if (document.body.classList.contains('theme-red')) return '#ff0033';
            if (document.body.classList.contains('theme-blue')) return '#00d2ff';
            return '#00ff00';
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = getActiveColor(); // Tema rengine göre matrix rengi değişir!
            ctx.font = fontSize + 'px Courier New';

            for (let i = 0; i < drops.length; i++) {
                const text = characters[Math.floor(Math.random() * characters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

</body>
</html>
